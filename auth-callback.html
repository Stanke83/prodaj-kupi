<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8"/>
  <title>Prijava — ProdajKupi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body{font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f9fafb;margin:0}
    .box{text-align:center;padding:40px;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);max-width:380px;width:100%}
    .spinner{width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#1a8f4b;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .err{color:#dc2626;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:14px;font-size:.88rem;margin-top:12px;text-align:left;line-height:1.5}
  </style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <h2 style="font-size:1.2rem;font-weight:700;margin-bottom:8px">Prijava u toku...</h2>
  <p style="color:#6b7280;font-size:.9rem" id="status">Obrađujemo tvoj Google nalog.</p>
</div>
<script>
var SB_URL = 'https://iyuyhbgampbwkxlbdgvi.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5dXloYmdhbXBid2t4bGJkZ3ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDMwOTAsImV4cCI6MjA5NzU3OTA5MH0.28-mt9G-lMDr35ijigo2f5IiYrzcBZAF0Rf4Y9L4DUA';

function setStatus(msg) { var el=document.getElementById('status'); if(el) el.textContent=msg; }
function showError(msg) {
  document.getElementById('spinner').style.display='none';
  document.getElementById('status').innerHTML='<div class="err">❌ '+msg+'</div><br/><a href="index.html" style="color:#1a8f4b;font-weight:600;font-size:.9rem">← Nazad na početnu</a>';
}

async function createOrGetUser(email, meta) {
  email = email.toLowerCase().trim();
  var name = (meta && (meta.full_name || meta.name)) || email.split('@')[0];
  var headers = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
  var chk = await fetch(SB_URL+'/rest/v1/users?email=eq.'+encodeURIComponent(email), {headers:headers});
  var existing = await chk.json();
  var user;
  if (existing && existing.length > 0) {
    user = existing[0];
  } else {
    var ins = await fetch(SB_URL+'/rest/v1/users', {
      method:'POST',
      headers:Object.assign({},headers,{'Prefer':'return=representation'}),
      body:JSON.stringify({name:name,email:email,pass:'google_'+Math.random().toString(36).slice(2,10),city:'',phone:''})
    });
    var rows = await ins.json();
    user = rows && rows[0];
  }
  if (!user) throw new Error('Nije moguće kreirati nalog.');
  localStorage.setItem('pk_session', JSON.stringify({
    id:user.id, name:user.name, email:user.email, city:user.city||'', phone:user.phone||''
  }));
  setStatus('Uspešno! Preusmeravanje...');
  var next = localStorage.getItem('pk_login_next') || 'index.html';
  localStorage.removeItem('pk_login_next');
  localStorage.removeItem('pkce_verifier');
  localStorage.removeItem('auth_attempts');
  setTimeout(function(){ window.location.replace(next); }, 600);
}

async function run() {
  // Zaštita od petlje
  var attempts = parseInt(localStorage.getItem('auth_attempts')||'0');
  if (attempts > 2) {
    localStorage.removeItem('auth_attempts');
    showError('Previše pokušaja. <a href="index.html" style="color:#1a8f4b">Pokušaj ponovo</a>');
    return;
  }
  localStorage.setItem('auth_attempts', attempts + 1);

  try {
    var params  = new URLSearchParams(window.location.search);
    var hash    = new URLSearchParams(window.location.hash.replace('#',''));
    var code    = params.get('code');
    var accTok  = hash.get('access_token');
    var errDesc = params.get('error_description') || hash.get('error_description');

    if (errDesc) throw new Error(decodeURIComponent(errDesc.replace(/\+/g,' ')));

    // Implicit flow (hash token)
    if (accTok) {
      setStatus('Dohvatam podatke...');
      var r = await fetch(SB_URL+'/auth/v1/user', {
        headers:{'Authorization':'Bearer '+accTok,'apikey':SB_KEY}
      });
      var ud = await r.json();
      if (!ud || !ud.email) throw new Error('Nije moguće dohvatiti podatke.');
      await createOrGetUser(ud.email, ud.user_metadata);
      return;
    }

    // PKCE flow — ručni exchange sa našim verifierom
    if (code) {
      setStatus('Razmena koda...');
      var verifier = localStorage.getItem('pkce_verifier');
      if (!verifier) throw new Error('PKCE verifier nije pronađen. Pokušaj da se prijaviš ponovo.');

      var body = new URLSearchParams({
        grant_type: 'authorization_code',
        code: code,
        code_verifier: verifier,
        redirect_uri: window.location.origin + '/auth-callback.html'
      });

      var tokenRes = await fetch(SB_URL + '/auth/v1/token?grant_type=authorization_code', {
        method: 'POST',
        headers: {
          'apikey': SB_KEY,
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: body.toString()
      });

      var tokenData = await tokenRes.json();
      if (tokenData.error || !tokenData.access_token) {
        throw new Error(tokenData.error_description || tokenData.error || 'Token exchange nije uspeo (status '+tokenRes.status+')');
      }

      var u = tokenData.user;
      if (!u || !u.email) throw new Error('Nije moguće dohvatiti email iz tokena.');
      await createOrGetUser(u.email, u.user_metadata);
      return;
    }

    throw new Error('Nije pronađen token ni code u URL-u.');
  } catch(e) {
    localStorage.removeItem('auth_attempts');
    showError(String(e.message||e).replace(/</g,'&lt;').replace(/>/g,'&gt;'));
  }
}

run();
</script>
</body>
</html>
