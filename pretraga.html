<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Pretraga — ProdajKupi</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1a8f4b"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<header class="header">
  <div class="header__top">
    <div class="header__top-inner">
      <a href="index.html" class="logo"><span class="logo__prodaj">Prodaj</span><span class="logo__kupi">Kupi</span></a>
      <div class="search-bar">
        <input type="text" id="searchInput" class="search-bar__input" placeholder="Pretraži oglase..."/>
        <select id="searchCategory" class="search-bar__select"><option value="">Sve kategorije</option></select>
        <button class="search-bar__btn" onclick="doSearch()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Pretraži
        </button>
      </div>
      <div class="header__actions" id="headerActions"></div>
    </div>
  </div>
</header>

<main class="search-page">
  <div class="container">
    <div class="search-layout">
      <aside class="search-sidebar">
        <h3>🔎 Filteri</h3>
        <div class="sidebar-filter"><label>Kategorija</label><select id="fCat" onchange="doSearch()"><option value="">Sve kategorije</option></select></div>
        <div class="sidebar-filter"><label>Grad</label><select id="fCity" onchange="doSearch()"><option value="">Svi gradovi</option></select></div>
        <div class="sidebar-filter"><label>Stanje</label>
          <select id="fCondition" onchange="doSearch()">
            <option value="">Sve</option><option>Novo</option><option>Kao novo</option><option>Polovno</option><option>Oštećeno</option>
          </select>
        </div>
        <div class="sidebar-filter"><label>Cena (RSD)</label>
          <div class="filter-price-row">
            <input type="number" id="fMinPrice" placeholder="Od" min="0" oninput="doSearchDebounced()"/>
            <span>—</span>
            <input type="number" id="fMaxPrice" placeholder="Do" min="0" oninput="doSearchDebounced()"/>
          </div>
        </div>
        <button class="btn btn--gray btn--full btn--sm" onclick="resetFilters()">Resetuj filtere</button>
      </aside>
      <div>
        <div class="sort-bar">
          <span class="sort-bar__info" id="resultInfo">Učitavanje...</span>
          <select id="fSort" onchange="doSearch()">
            <option value="newest">Najnoviji</option>
            <option value="price_asc">Cena: niža → viša</option>
            <option value="price_desc">Cena: viša → niža</option>
          </select>
        </div>
        <div class="listings__grid" id="resultsGrid"></div>
        <div id="loadMoreWrap" style="display:none;justify-content:center;padding:24px 0">
          <button id="loadMoreBtn" class="btn btn--outline" onclick="loadMore()" style="padding:12px 40px;font-size:.95rem">Učitaj još oglasa</button>
        </div>
        <div class="empty-state" id="emptyState" style="display:none">
          <div class="empty-state__icon">🔍</div>
          <h3>Nema rezultata</h3>
          <p>Pokušaj sa drugačijim filterima.</p>
          <button class="btn btn--outline" onclick="resetFilters()">Resetuj filtere</button>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="detailModal"><div class="modal modal--wide" id="detailContent"></div></div>
<div class="toast" id="toast"></div>

<script src="js/db.js"></script>
<script src="js/supabase.js"></script>
<script src="js/header.js"></script>
<script src="js/shared.js"></script>
<script src="js/photos.js"></script>
<script src="js/notifications.js"></script>
<script src="js/vendor/supabase.min.js"></script>
<script src="js/google-auth.js"></script>
<script>
var currentPage = 1;
var totalAds = null;
var isLoadingMore = false;

function renderResults(append) {
  if (isLoadingMore) return;
  var filters = getFilters();
  filters.page = currentPage;
  filters.perPage = 16;

  if (!append) {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('resultsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray-400)">⏳ Učitavanje...</div>';
    document.getElementById('pagination').innerHTML = '';
    document.getElementById('loadMoreWrap').style.display = 'none';
  } else {
    isLoadingMore = true;
    var btn = document.getElementById('loadMoreBtn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Učitavanje...'; }
  }

  SB.getAds(filters).then(function(ads) {
    isLoadingMore = false;
    ads = ads || [];
    totalAds = ads._total != null ? ads._total : totalAds;
    var perPage = 16;
    var totalPages = totalAds ? Math.ceil(totalAds / perPage) : null;

    var q = filters.search ? ' za "'+filters.search+'"' : '';
    var countStr = totalAds != null ? '<strong>'+totalAds+'</strong>' : '<strong>'+ads.length+(ads.length===perPage?'+':'')+'</strong>';
    document.getElementById('resultInfo').innerHTML = countStr + ' oglasa' + q;

    if (!ads.length && !append) {
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('resultsGrid').innerHTML = '';
      return;
    }

    var grid = document.getElementById('resultsGrid');
    var newCards = ads.map(function(ad){ return adCard(ad); }).join('');
    if (append) {
      grid.insertAdjacentHTML('beforeend', newCards);
    } else {
      grid.innerHTML = newCards;
    }

    var loadWrap = document.getElementById('loadMoreWrap');
    var hasMore = totalPages ? currentPage < totalPages : ads.length === perPage;
    if (hasMore) {
      loadWrap.style.display = 'flex';
      var btn2 = document.getElementById('loadMoreBtn');
      if (btn2) { btn2.disabled = false; btn2.textContent = 'Učitaj još oglasa'; }
    } else {
      loadWrap.style.display = 'none';
    }

    var pag = document.getElementById('pagination');
    if (!totalPages || totalPages <= 1) { pag.innerHTML = ''; return; }
    var prevBtn = currentPage > 1 ? '<button class="pagination__btn" onclick="goPage('+(currentPage-1)+')">‹ Prethodna</button>' : '';
    var nextBtn = currentPage < totalPages ? '<button class="pagination__btn" onclick="goPage('+(currentPage+1)+')">Sledeća ›</button>' : '';
    var pages = '';
    var start2 = Math.max(1, currentPage - 2);
    var end2  = Math.min(totalPages, currentPage + 2);
    if (start2 > 1) pages += '<button class="pagination__btn" onclick="goPage(1)">1</button>'+(start2>2?'<span style="padding:0 4px">…</span>':'');
    for (var i = start2; i <= end2; i++) {
      pages += '<button class="pagination__btn'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
    }
    if (end2 < totalPages) pages += (end2<totalPages-1?'<span style="padding:0 4px">…</span>':'')+'<button class="pagination__btn" onclick="goPage('+totalPages+')">'+totalPages+'</button>';
    pag.innerHTML = prevBtn + pages + nextBtn;

  }).catch(function(e) {
    isLoadingMore = false;
    document.getElementById('resultInfo').textContent = 'Greška: ' + e.message;
  });
}

function loadMore() {
  currentPage++;
  renderResults(true);
}

function doSearch() { currentPage = 1; totalAds = null; renderResults(); }
var _searchTimer;
function doSearchDebounced() { clearTimeout(_searchTimer); _searchTimer = setTimeout(doSearch, 400); }
function resetFilters() {
  currentPage = 1; totalAds = null;
  ['fCat','fCity','fCondition','fSort'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
  ['fMinPrice','fMaxPrice'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('searchInput').value = '';
  renderResults();
}

function goPage(p) {
  currentPage = p;
  renderResults();
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('detailModal').addEventListener('click',function(e){if(e.target.id==='detailModal')closeModal('detailModal');});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal('detailModal');});
document.getElementById('searchInput').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
document.getElementById('searchCategory').addEventListener('change',function(){document.getElementById('fCat').value=this.value;doSearch();});

document.addEventListener('DOMContentLoaded',function(){ renderHeader(); readParams(); renderResults(); });
</script>
<div id="google-btn-hidden" style="display:none"></div>
</body>
</html>
